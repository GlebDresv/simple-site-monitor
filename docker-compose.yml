services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api:/var/www/api:ro
    depends_on:
      - api
      - frontend
    networks:
      - sum

  api:
    build:
      context: ./api
    volumes:
      - ./api:/var/www/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sum

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - sum

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sum}
      POSTGRES_USER: ${POSTGRES_USER:-sum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sum} -d ${POSTGRES_DB:-sum}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sum

  redis:
    image: redis:7-alpine
    networks:
      - sum

  scheduler:
    build:
      context: ./api
    volumes:
      - ./api:/var/www/api
    command: php artisan schedule:work
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sum

  worker:
    build:
      context: ./api
    volumes:
      - ./api:/var/www/api
    command: php artisan queue:work --queue=default --tries=3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sum

  worker-domain-checks:
    build:
      context: ./api
    volumes:
      - ./api:/var/www/api
    command: php artisan queue:work --queue=domain-checks --tries=3 --timeout=30
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sum

networks:
  sum:
    driver: bridge

volumes:
  frontend_node_modules:
